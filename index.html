<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>全志科技 · 瑞芯微 投资数据</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#c8d0d8;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC",sans-serif;padding:12px;min-height:100vh}
.w{max-width:1200px;margin:0 auto}
.hd{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #1a2533;margin-bottom:14px}
.hd h1{font-size:18px;font-weight:600;background:linear-gradient(135deg,#ff6b35,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.hd .sub{font-size:11px;color:#5a6a7a}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:16px}
.stat{background:linear-gradient(135deg,#0f1928,#14212e);border-radius:8px;padding:10px 12px;border:1px solid #1a2a38}
.stat .v{font-size:16px;font-weight:700;line-height:1.3}
.stat .l{font-size:10px;color:#6a7a8a;margin-top:2px}
.section{margin:14px 0 8px;padding:4px 8px;border-left:3px solid #ff6b35;font-size:14px;font-weight:600;color:#d0d8e0}
.section.s2{border-left-color:#3b8beb}
.card{background:linear-gradient(135deg,#0c1622,#111d2a);border-radius:8px;padding:12px;border:1px solid #1a2a38;margin-bottom:8px}
.card .ct{font-size:11px;font-weight:600;color:#8898a8;margin-bottom:6px;padding-left:2px}
.card .ch{width:100%;height:260px}
.card .empty{text-align:center;padding:40px 0;color:#3a4a5a;font-size:13px}
.card .empty .ic{font-size:28px;margin-bottom:8px;opacity:0.5}

.status-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:11px;color:#5a6a7a}
.status-bar .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px}
.dot.g{background:#00cc66}
.dot.y{background:#f0ad4e}
.dot.r{background:#ff4444}
.collect-badge{display:inline-block;background:linear-gradient(135deg,#1a2533,#1a2a38);border:1px solid #2a3a4a;border-radius:4px;padding:2px 8px;font-size:10px;color:#7a8a9a;margin-left:6px}
</style>
</head>
<body>
<div class="w">
<div class="hd">
  <h1>全志科技 · 瑞芯微 投资仪表盘</h1>
  <div class="sub">数据源: 新浪财经 单季度口径</div>
</div>

<div class="status-bar">
  <span><span class="dot g"></span>毛利率数据已确认</span>
  <span><span class="dot y"></span>部分财务数据待采集</span>
  <span><span class="dot r"></span>资本开支/自由现金流待采集</span>
  <span class="collect-badge">每日自动更新 ⚡</span>
</div>

<!-- 概要统计 -->
<div class="stats" id="summaryStats"></div>

<!-- ===== 全志科技 ===== -->
<div class="section">全志科技 (300458)</div>
<div class="card"><div class="ct">销售毛利率 (%)</div><div class="ch" id="aw_gm"></div></div>
<div class="card"><div class="ct">营业收入 (亿元)</div><div class="ch" id="aw_rev"></div></div>
<div class="card"><div class="ct">净利润 (亿元)</div><div class="ch" id="aw_np"></div></div>
<div class="card"><div class="ct">扣非净利润 (亿元)</div><div class="ch" id="aw_nongaap"></div></div>
<div class="card"><div class="ct">研发费用 (亿元)</div><div class="ch" id="aw_rd"></div></div>
<div class="card"><div class="ct">资本开支 (亿元)</div><div class="ch" id="aw_capex"></div></div>
<div class="card"><div class="ct">自由现金流 (亿元)</div><div class="ch" id="aw_fcf"></div></div>

<!-- ===== 瑞芯微 ===== -->
<div class="section s2">瑞芯微 (603893)</div>
<div class="card"><div class="ct">销售毛利率 (%)</div><div class="ch" id="rk_gm"></div></div>
<div class="card"><div class="ct">营业收入 (亿元)</div><div class="ch" id="rk_rev"></div></div>
<div class="card"><div class="ct">净利润 (亿元)</div><div class="ch" id="rk_np"></div></div>
<div class="card"><div class="ct">扣非净利润 (亿元)</div><div class="ch" id="rk_nongaap"></div></div>
<div class="card"><div class="ct">研发费用 (亿元)</div><div class="ch" id="rk_rd"></div></div>
<div class="card"><div class="ct">资本开支 (亿元)</div><div class="ch" id="rk_capex"></div></div>
<div class="card"><div class="ct">自由现金流 (亿元)</div><div class="ch" id="rk_fcf"></div></div>
</div>

<script>
const ec = echarts;

// 从框架数据加载
const EMBEDDED_DATA = {"全志科技":{"gross_margin":{"periods":["2021Q1","2021Q2","2021Q3","2021Q4","2022Q1","2022Q2","2022Q3","2022Q4","2023Q1","2023Q2","2023Q3","2023Q4","2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4","2026Q1"],"values":[30.48,43.29,47.21,40.36,44.46,37.6,34.2,35.85,31.88,31.33,33.46,32.63,33.44,32.68,30.83,28.42,32.53,33.46,32.57,32.96,40.21]},"revenue":{"periods":["2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4","2026Q1"],"values":[4.1,6.53,6.23,6.03,6.2,7.17,8.24,6.77,9.12]},"net_profit":{"periods":["2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4","2026Q1"],"values":[0.49,0.7,0.32,0.16,0.92,0.7,1.17,-0.16,2.03]},"non_gaap":{"periods":["2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4","2026Q1"],"values":[0.17,0.64,0.28,0.07,0.56,0.79,1.11,-0.15,2.01]},"rd":{"periods":[],"values":[]},"capex":{"periods":[],"values":[]},"free_cash_flow":{"periods":[],"values":[]},"market_cap":{"value":322.73,"unit":"亿","date":"2026-06-05"}},"瑞芯微":{"gross_margin":{"periods":["2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4","2026Q1"],"values":[34.7,36.8,36.9,39.5,41,43.2,40.8,41.1,43]},"revenue":{"periods":["2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4","2026Q1"],"values":[5.43,7.06,9.11,9.77,8.85,11.61,10.96,12.61,12.05]},"net_profit":{"periods":["2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4","2026Q1"],"values":[0.68,1.15,1.69,2.43,2.09,3.22,2.48,2.6,3.29]},"non_gaap":{"periods":["2024Q1","2024Q2","2024Q3","2024Q4","2025Q1","2025Q2","2025Q3","2025Q4","2026Q1"],"values":[0.66,1.11,1.67,1.95,2.08,3.08,2.4,2.53,3.2]},"rd":{"periods":[],"values":[]},"capex":{"periods":[],"values":[]},"free_cash_flow":{"periods":[],"values":[]},"market_cap":{"value":729.29,"unit":"亿","date":"2026-06-05"}}};

async function loadData() {
  try {
    try { const resp = await fetch('./outputs/data/framework_data.json'); return await resp.json(); } catch(e) { console.warn('Using embedded data, fetch failed:', e); return EMBEDDED_DATA; }
  } catch(e) {
    console.warn('数据加载失败:', e);
    return null;
  }
}

// 默认图表配置
function makeChart(elId, periods, values, opts) {
  const el = document.getElementById(elId);
  if (!el) return;
  
  // 检查是否有数据
  if (!periods || !values || periods.length === 0) {
    el.style.height = '60px';
    el.innerHTML = '<div class="empty"><div class="ic">📭</div>数据待采集，采集后将展示在这里</div>';
    return;
  }
  
  const chart = ec.init(el);
  const opt = {
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(10,14,23,0.9)', borderColor: '#1a2a38',
      textStyle: { color: '#c8d0d8', fontSize: 12 } },
    grid: { left: '6%', right: '5%', bottom: '14%', top: '8%' },
    xAxis: { type: 'category', data: periods,
      axisLabel: { color: '#5a6a7a', fontSize: 10, interval: 'auto', rotate: periods.length > 20 ? 45 : 0 },
      axisLine: { lineStyle: { color: '#1a2533' } },
      splitLine: { show: false } },
    yAxis: { type: 'value', name: opts?.unit || '',
      nameTextStyle: { color: '#5a6a7a', fontSize: 10 },
      axisLabel: { color: '#5a6a7a', fontSize: 10 },
      splitLine: { lineStyle: { color: '#1a2533', type: 'dashed' } } },
    dataZoom: periods.length > 12 ? [{ type: 'inside', start: Math.max(0, 100 - 30/periods.length*100) }] : undefined,
    series: [{
      type: opts?.type || 'bar',
      data: values.map((v, i) => ({
        value: v,
        itemStyle: {
          color: i === values.length - 1 ? '#ff6b35' : (opts?.color || '#3b8beb'),
          borderRadius: [2,2,0,0]
        }
      })),
      markLine: opts?.markLine,
      smooth: opts?.type === 'line',
      showSymbol: opts?.type === 'line' && periods.length < 20,
      lineStyle: opts?.type === 'line' ? { width: 2, color: '#3b8beb' } : undefined,
      areaStyle: opts?.type === 'line' ? { color: 'rgba(59,139,235,0.08)' } : undefined
    }]
  };
  chart.setOption(opt);
  window.addEventListener('resize', () => chart.resize());
}

function renderEmpty(elId, text) {
  const el = document.getElementById(elId);
  if (el) {
    el.style.height = '60px';
    el.innerHTML = `<div class="empty"><div class="ic">📭</div>${text}</div>`;
  }
}

function updateSummary(data) {
  const div = document.getElementById('summaryStats');
  if (!div) return;
  
  let html = '';
  if (data['全志科技']) {
    const aw = data['全志科技'];
    html += `<div class="stat"><div class="v" style="color:#ff6b35">${
      aw.gross_margin?.values?.slice(-1)[0]?.toFixed(2) || '--'}%</div><div class="l">全志 最新毛利率</div></div>`;
    html += `<div class="stat"><div class="v" style="color:#00d8ff">${
      aw.market_cap?.value || '--'}亿</div><div class="l">全志 市值</div></div>`;
    const lastRev = aw.revenue?.values?.slice(-1)[0];
    html += `<div class="stat"><div class="v" style="color:#f39c12">${
      lastRev ? lastRev.toFixed(2) + '亿' : '--'}</div><div class="l">全志 最新营收</div></div>`;
  }
  if (data['瑞芯微']) {
    const rk = data['瑞芯微'];
    html += `<div class="stat"><div class="v" style="color:#ff6b35">${
      rk.gross_margin?.values?.slice(-1)[0]?.toFixed(2) || '--'}%</div><div class="l">瑞芯微 最新毛利率</div></div>`;
    html += `<div class="stat"><div class="v" style="color:#00d8ff">${
      rk.market_cap?.value || '--'}亿</div><div class="l">瑞芯微 市值</div></div>`;
    const lastRev = rk.revenue?.values?.slice(-1)[0];
    html += `<div class="stat"><div class="v" style="color:#f39c12">${
      lastRev ? lastRev.toFixed(2) + '亿' : '--'}</div><div class="l">瑞芯微 最新营收</div></div>`;
  }
  div.innerHTML = html;
}

async function init() {
  const data = await loadData();
  
  if (!data) {
    ['aw_gm','aw_rev','aw_np','aw_nongaap','aw_rd','aw_capex','aw_fcf',
     'rk_gm','rk_rev','rk_np','rk_nongaap','rk_rd','rk_capex','rk_fcf'].forEach(id => {
      renderEmpty(id, '数据加载失败，请检查网络或刷新页面');
    });
    return;
  }
  
  updateSummary(data);
  
  // 全志科技
  const aw = data['全志科技'] || {};
  makeChart('aw_gm', aw.gross_margin?.periods, aw.gross_margin?.values, {unit:'%', markLine: {data:[{yAxis:40,label:{formatter:'40%',color:'#e74c3c',fontSize:10},lineStyle:{color:'#e74c3c',type:'dashed'}}]}, color:'#ff6b35'});
  makeChart('aw_rev', aw.revenue?.periods, aw.revenue?.values, {unit:'亿元'});
  makeChart('aw_np', aw.net_profit?.periods, aw.net_profit?.values, {unit:'亿元', color:'#27ae60', type:'bar'});
  makeChart('aw_nongaap', aw.non_gaap?.periods, aw.non_gaap?.values, {unit:'亿元', color:'#8e44ad', type:'bar'});
  makeChart('aw_rd', aw.rd?.periods, aw.rd?.values, {unit:'亿元', color:'#3498db', type:'bar'});
  
  if (aw.capex?.periods?.length > 0) {
    makeChart('aw_capex', aw.capex.periods, aw.capex.values, {unit:'亿元', color:'#e67e22'});
  } else {
    renderEmpty('aw_capex', '资本开支待采集（需从现金流量表获取）');
  }
  if (aw.free_cash_flow?.periods?.length > 0) {
    makeChart('aw_fcf', aw.free_cash_flow.periods, aw.free_cash_flow.values, {unit:'亿元', color:'#1abc9c', type:'line'});
  } else {
    renderEmpty('aw_fcf', '自由现金流待采集（需从现金流量表获取）');
  }
  
  // 瑞芯微
  const rk = data['瑞芯微'] || {};
  if (rk.gross_margin?.periods?.length > 0) {
    makeChart('rk_gm', rk.gross_margin.periods, rk.gross_margin.values, {unit:'%', markLine: {data:[{yAxis:40,label:{formatter:'40%',color:'#e74c3c',fontSize:10},lineStyle:{color:'#e74c3c',type:'dashed'}}]}, color:'#ff6b35'});
  } else {
    renderEmpty('rk_gm', '瑞芯微毛利率待采集');
  }
  if (rk.revenue?.periods?.length > 0) {
    makeChart('rk_rev', rk.revenue.periods, rk.revenue.values, {unit:'亿元'});
  } else {
    renderEmpty('rk_rev', '瑞芯微营收待采集');
  }
  makeChart('rk_np', rk.net_profit?.periods, rk.net_profit?.values, {unit:'亿元', color:'#27ae60'});
  makeChart('rk_nongaap', rk.non_gaap?.periods, rk.non_gaap?.values, {unit:'亿元', color:'#8e44ad'});
  makeChart('rk_rd', rk.rd?.periods, rk.rd?.values, {unit:'亿元', color:'#3498db'});
  
  if (rk.capex?.periods?.length > 0) {
    makeChart('rk_capex', rk.capex.periods, rk.capex.values, {unit:'亿元', color:'#e67e22'});
  } else {
    renderEmpty('rk_capex', '资本开支待采集');
  }
  if (rk.free_cash_flow?.periods?.length > 0) {
    makeChart('rk_fcf', rk.free_cash_flow.periods, rk.free_cash_flow.values, {unit:'亿元', color:'#1abc9c', type:'line'});
  } else {
    renderEmpty('rk_fcf', '自由现金流待采集');
  }
}

init();
</script>
</body>
</html>
