<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>半导体投资数据看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f5f6fa; color: #2d3436; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 8px; }
.subtitle { color: #636e72; font-size: 14px; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.card-role { font-size: 12px; color: #636e72; margin-bottom: 8px; }
.price { font-size: 32px; font-weight: 700; }
.change { font-size: 14px; font-weight: 500; margin-left: 8px; }
.up { color: #e74c3c; }
.down { color: #27ae60; }
.flat { color: #636e72; }
.meta { font-size: 12px; color: #636e72; margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
.section-title { font-size: 18px; font-weight: 600; margin: 24px 0 12px; }
.news-item { background: white; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.news-date { font-size: 12px; color: #636e72; }
.news-text { margin-top: 4px; }
.links { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
.links a { text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; }
.btn-primary { background: #0984e3; color: white; }
.btn-secondary { background: #dfe6e9; color: #2d3436; }
#status { background: #ffeaa7; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 14px; display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 半导体持仓数据看板</h1>
  <p class="subtitle" id="lastUpdate">最后更新：--</p>
  
  <div id="status">⚠️ 暂无数据，请先运行 <code>python3 work/data_collector.py --market</code> 采集</div>
  
  <div class="grid" id="stockGrid"></div>
  
  <div class="links">
    <a class="btn-primary" href="#" onclick="refresh(); return false;">🔄 刷新</a>
    <a class="btn-secondary" href="data/" target="_blank">📁 查看数据文件</a>
  </div>
</div>

<script>
async function refresh() {
  const grid = document.getElementById('stockGrid');
  const status = document.getElementById('status');
  
  // Try to load the latest data files
  try {
    const resp = await fetch('data/');
    const text = await resp.text();
    // Extract JSON files
    const jsonFiles = [...text.matchAll(/snapshot_(\d{4}-\d{2}-\d{2})\.json/g)].map(m => m[1]).sort().reverse();
    
    if (jsonFiles.length === 0) {
      status.style.display = 'block';
      return;
    }
    
    status.style.display = 'none';
    const latestDate = jsonFiles[0];
    
    const dataResp = await fetch(`data/snapshot_${latestDate}.json`);
    const snap = await dataResp.json();
    
    document.getElementById('lastUpdate').textContent = `最后更新: ${snap.date} | 行情日期: ${snap.market_date || '--'}`;
    
    let html = '';
    for (const [name, info] of Object.entries(snap.stocks)) {
      const d = info.data;
      if (!d.price) {
        html += `<div class="card"><div class="card-name">${name}</div><div class="card-role">${info.role}</div><div style="color:#636e72">⚠️ 暂无数据</div></div>`;
        continue;
      }
      const isUp = d.change >= 0;
      const cls = isUp ? 'up' : 'down';
      const arrow = isUp ? '▲' : '▼';
      const changeStr = `${arrow} ${Math.abs(d.change).toFixed(2)} (${Math.abs(d.change_pct).toFixed(2)}%)`;
      
      html += `<div class="card">
        <div class="card-name">${name}</div>
        <div class="card-role">${info.role}</div>
        <div><span class="price">¥${d.price.toFixed(2)}</span><span class="change ${cls}">${changeStr}</span></div>
        <div class="meta">
          <span>高: ¥${d.high.toFixed(2)}</span>
          <span>低: ¥${d.low.toFixed(2)}</span>
          <span>开: ¥${d.open.toFixed(2)}</span>
          <span>昨收: ¥${d.yclose.toFixed(2)}</span>
          <span>成交: ${d.amount}亿</span>
        </div>
      </div>`;
    }
    grid.innerHTML = html;
  } catch(e) {
    status.style.display = 'block';
    status.textContent = `⚠️ ${e.message}`;
  }
}

refresh();
</script>
</body>
</html>
